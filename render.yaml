# Render Blueprint — https://render.com/docs/blueprint-spec
# Set secret env vars (MONGODB_URI, JWT_SECRET, EMAIL_PASS, etc.) in the Render dashboard.
services:
  - type: web
    name: octazen-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        value: https://www.octazentechnologies.com
      - key: ADMIN_EMAIL
        value: admin@octazentechnologies.com
      # Set ADMIN_PASSWORD in Render dashboard (required for admin login)
      - key: JWT_EXPIRE
        value: 7d
      - key: EMAIL_HOST
        value: smtpout.secureserver.net
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USER
        value: contact@octazentechnologies.com
      - key: EMAIL_FROM
        value: "Octazen Technologies <contact@octazentechnologies.com>"
      - key: MAX_FILE_SIZE
        value: "5242880"
      - key: UPLOAD_PATH
        value: ./uploads
